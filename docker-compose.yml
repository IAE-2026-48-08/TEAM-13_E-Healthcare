services:
  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    environment:
      APP_ENV: local
      IAE_API_KEY: KEY-MHS-390
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database-data/database.sqlite
    command: >
      sh -c "mkdir -p /var/www/database-data &&
             touch /var/www/database-data/database.sqlite &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - appointment-data:/var/www/database-data
    networks:
      - laravel

  data-pasien-service:
    build:
      context: ./data-pasien-service
      dockerfile: Dockerfile
    container_name: data-pasien-service
    environment:
      APP_ENV: local
      IAE_API_KEY: KEY-MHS-279
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database-data/database.sqlite
    command: >
      sh -c "mkdir -p /var/www/database-data &&
             touch /var/www/database-data/database.sqlite &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - patient-data:/var/www/database-data
    networks:
      - laravel

  farmasi-service:
    build:
      context: ./farmasi-service
      dockerfile: Dockerfile
    container_name: farmasi-service
    environment:
      APP_ENV: local
      IAE_API_KEY: KEY-MHS-157
      APPOINTMENT_API_KEY: KEY-MHS-390
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database-data/database.sqlite
    command: >
      sh -c "mkdir -p /var/www/database-data &&
             touch /var/www/database-data/database.sqlite &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - pharmacy-data:/var/www/database-data
    networks:
      - laravel

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - appointment-service
      - data-pasien-service
      - farmasi-service
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  appointment-data:
  patient-data:
  pharmacy-data:
