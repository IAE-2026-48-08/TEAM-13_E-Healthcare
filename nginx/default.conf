server {
    listen 80;
    server_name localhost;

    location / {
        return 200 "API Gateway OK";
    }

    location /api/v1/appointments {
        proxy_pass http://appointment-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/patients {
        proxy_pass http://data-pasien-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/pharmacy {
        proxy_pass http://farmasi-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-IAE-KEY $http_x_iae_key;
    }
}